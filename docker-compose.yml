version: '3'
services:
  othertales-datasets:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - NEXT_PUBLIC_AGENT_NAME=OtherTales Datasets Agent
      - USE_EXPLICIT_GRAPH=true
      - LANGCHAIN_PROJECT=othertales-datasets
      - LANGCHAIN_TRACING_V2=true
      - DATASET_AGENT_URL=/agent
    volumes:
      - .:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s