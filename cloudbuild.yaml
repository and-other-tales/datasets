steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/othertales-datasets:$COMMIT_SHA', '-f', 'ui/Dockerfile', './ui']

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/othertales-datasets:$COMMIT_SHA']

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'othertales-datasets'
      - '--image=gcr.io/$PROJECT_ID/othertales-datasets:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'  # Remove this if you want authentication
      - '--port=8080'
      - '--cpu=1'
      - '--memory=1Gi'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--set-env-vars=NODE_ENV=production'
      # Add environment variables from env.example
      - '--set-env-vars=API_KEY=${_API_KEY},LOG_LEVEL=${_LOG_LEVEL},DEBUG=${_DEBUG},DB_HOST=${_DB_HOST},DB_PORT=${_DB_PORT},DB_USER=${_DB_USER},DB_PASSWORD=${_DB_PASSWORD},DB_NAME=${_DB_NAME}'
      # Mount the Cloud Storage bucket
      - '--volume=name=gcs,mount-path=/gcs'
      - '--volume-type=gcs'
      - '--service-account=othertales-datasets-sa@$PROJECT_ID.iam.gserviceaccount.com'  # Replace with your service account

images:
  - 'gcr.io/$PROJECT_ID/othertales-datasets:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY