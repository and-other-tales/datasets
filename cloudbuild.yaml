steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/othertales-datasets:$COMMIT_SHA', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/othertales-datasets:$COMMIT_SHA']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'beta'
      - 'run'
      - 'deploy'
      - 'othertales-datasets'
      - '--image=gcr.io/$PROJECT_ID/othertales-datasets:$COMMIT_SHA'
      - '--region=europe-west4'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--cpu=1'
      - '--memory=1Gi'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--set-env-vars=NODE_ENV=production'
      - '--set-env-vars=API_KEY=${_API_KEY},LOG_LEVEL=${_LOG_LEVEL},DEBUG=${_DEBUG},DB_HOST=${_DB_HOST},DB_PORT=${_DB_PORT},DB_USER=${_DB_USER},DB_PASSWORD=${_DB_PASSWORD},DB_NAME=${_DB_NAME}'
      - '--set-env-vars=POSTGRES_URI=${_POSTGRES_URI},AWS_ACCESS_KEY_ID=${_AWS_ACCESS_KEY_ID},AWS_SECRET_ACCESS_KEY=${_AWS_SECRET_ACCESS_KEY},AWS_DEFAULT_REGION=${_AWS_DEFAULT_REGION},LANGCHAIN_API_KEY=${_LANGCHAIN_API_KEY},LANGCHAIN_ENDPOINT=${_LANGCHAIN_ENDPOINT}'
      - '--set-env-vars=USE_EXPLICIT_GRAPH=true,DATASET_AGENT_URL=/agent'
      - '--add-volume=name=gcs,type=cloud-storage,bucket=mixture-othertales-co'
      - '--add-volume-mount=volume=gcs,mount-path=/gcs'
      - '--service-account=othertales-datasets-sa@$PROJECT_ID.iam.gserviceaccount.com'

images:
  - 'gcr.io/$PROJECT_ID/othertales-datasets:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY

# GitHub trigger configuration
# Note: You'll need to set up the GitHub trigger in Google Cloud Console
# Navigate to Cloud Build > Triggers and connect your GitHub repository
# https://console.cloud.google.com/cloud-build/triggers
