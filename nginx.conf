server {
    listen 8080;
    server_name localhost;
    
    # Default location - route exact matches of / to web redirect on 8080
    location = / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
    
    # Route all /assistants/ paths to the LangGraph server on 8251
    location /assistants/ {
        proxy_pass http://127.0.0.1:8251;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
    
    # Route /info to the LangGraph server on 8251
    location /info {
        proxy_pass http://127.0.0.1:8251;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
    
    # Add any other API endpoints that should go to the LangGraph server
    # Example:
    # location /api/ {
    #     proxy_pass http://127.0.0.1:8251;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection 'upgrade';
    #     proxy_set_header Host $host;
    #     proxy_cache_bypass $http_upgrade;
    # }
}